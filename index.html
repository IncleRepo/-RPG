<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG 프로젝트</title>
    <meta name="description" content="JavaScript, HTML, CSS로 만드는 브라우저 기반 RPG 프로젝트" />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">2D Browser RPG</p>
        <h1>RPG 프로젝트</h1>
        <p class="hero-copy">
          브라우저에서 동작하는 RPG 프로토타입입니다. 플레이어, 맵, 전투, UI 시스템을 단계적으로
          확장해 나가는 기본 화면입니다.
        </p>
      </header>

      <main class="layout">
        <section class="panel game-panel">
          <div class="panel-header">
            <h2>연습 스테이지</h2>
            <span id="status-badge">준비 중</span>
          </div>
          <div class="game-stage" id="game-stage" aria-label="기본 이동 스테이지" tabindex="0">
            <div class="stage-sun" aria-hidden="true"></div>
            <div class="stage-hills" aria-hidden="true"></div>
            <div class="stage-platform platform-ground" data-platform="ground"></div>
            <div class="stage-platform platform-mid" data-platform="mid"></div>
            <div class="stage-platform platform-high" data-platform="high"></div>
            <div class="stage-platform platform-top" data-platform="top"></div>
            <div class="player" id="player" aria-label="플레이어 캐릭터">
              <div class="player-body">
                <div class="player-face"></div>
              </div>
            </div>
          </div>
        </section>

        <aside class="sidebar">
          <section class="panel">
            <h2>조작법</h2>
            <ul class="task-list control-list">
              <li><kbd>A</kbd> 또는 <kbd>←</kbd> : 왼쪽 이동</li>
              <li><kbd>D</kbd> 또는 <kbd>→</kbd> : 오른쪽 이동</li>
              <li><kbd>W</kbd>, <kbd>↑</kbd>, <kbd>Space</kbd> : 점프</li>
              <li>캐릭터는 발판 위에 착지하고 공중에서는 중력이 적용됩니다.</li>
            </ul>
          </section>

          <section class="panel">
            <h2>현재 상태</h2>
            <dl class="meta-list">
              <div>
                <dt>위치</dt>
                <dd id="position-readout">X 0 / Y 0</dd>
              </div>
              <div>
                <dt>움직임</dt>
                <dd id="state-readout">초기화 중</dd>
              </div>
              <div>
                <dt>속도</dt>
                <dd id="velocity-readout">VX 0 / VY 0</dd>
              </div>
            </dl>
          </section>
        </aside>
      </main>
    </div>

    <script src="./src/scripts/main.js"></script>
  </body>
</html>
